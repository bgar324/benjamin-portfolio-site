<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="{{ title }} | {{ profile.name }}">
    <meta property="og:description" content="{{ profile.tagline }}">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon" />
    <title>{{ title }} | {{ profile.name }}</title>
</head>

<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a class="logo-touch-target" href="{{ url_for('index') }}" aria-label="{{ profile.name }} home">
                <div class="nav-logo">
                    <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="MLH logo" />
                </div>
            </a>

            <nav aria-label="Main navigation">
                {% for item in nav_items %}
                    <a
                        class="nav-link {% if request.endpoint == item.endpoint %}active{% endif %}"
                        href="{{ url_for(item.endpoint) }}"
                    >
                        {{ item.label }}
                    </a>
                {% endfor %}
            </nav>
        </div>
    </header>

    <div class="profile">
        <div id="profile-picture" class="profile-picture">
            <img src="{{ url_for('static', filename=profile.photo) }}" alt="{{ profile.name }}">
        </div>
        <h1>{{ profile.name }}</h1>
        <p>{{ profile.tagline }}</p>
    </div>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
